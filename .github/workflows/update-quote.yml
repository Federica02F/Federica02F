name: Update Random Quote

on:
  schedule:
    - cron: "0 6 * * *"   # Ogni giorno alle 06:00 UTC
  push:
    branches:
      - main
  workflow_dispatch:       # Permette l'esecuzione manuale

jobs:
  update-quote:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run quote updater
        run: node update_quote.js

      - name: Commit e push se ci sono modifiche
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: aggiorna citazione"
          git push
